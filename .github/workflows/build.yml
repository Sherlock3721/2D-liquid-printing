name: Build and Release

on:
  release:
    types: [published]

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact_name: gcode-editor-win.exe
            asset_name: gcode-editor-windows.exe
          - os: ubuntu-latest
            artifact_name: main
            asset_name: gcode-editor-linux

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' # Stabilnější verze pro kompilaci

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: pyinstaller --noconfirm main.spec

      - name: Rename Artifact (Windows)
        if: matrix.os == 'windows-latest'
        run: move dist/main.exe dist/${{ matrix.artifact_name }}
        shell: cmd

      - name: Rename Artifact (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: mv dist/main dist/${{ matrix.artifact_name }}

      - name: Upload Release Asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: ./dist/${{ matrix.artifact_name }}
          asset_name: ${{ matrix.asset_name }}
          asset_content_type: application/octet-stream
